<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image to Text Converter | OnePilotTools</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #007bff; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { width: 100%; max-width: 650px; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; border-radius: 15px; cursor: pointer; background: #fafafa; margin-bottom: 20px; position: relative; }
        .upload-area:hover { border-color: var(--p); background: #f0f7ff; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        #extract-btn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #extract-btn:disabled { background: #ccc; }
        #result-area { margin-top: 30px; display: none; text-align: left; }
        #output { width: 100%; min-height: 200px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; white-space: pre-wrap; background: #fff; margin-top: 10px; outline: none; }
        .loader { display: none; margin: 15px auto; width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>AI Image to Text</h1>
    <p>Convert images to text instantly without any server lag.</p>

    <div class="upload-area">
        <span id="file-label">📸 Click to upload image</span>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <button id="extract-btn">Extract Text Now</button>
    <div class="loader" id="loader"></div>

    <div id="result-area">
        <strong>Extracted Text:</strong>
        <div id="output" contenteditable="true"></div>
        <button onclick="copyText()" style="margin-top:10px; padding:8px 15px; cursor:pointer;">Copy Text</button>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const extractBtn = document.getElementById('extract-btn');
    const output = document.getElementById('output');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('result-area');

    imageInput.onchange = () => {
        if(imageInput.files[0]) document.getElementById('file-label').innerText = imageInput.files[0].name;
    };

    extractBtn.onclick = async () => {
        if (!imageInput.files[0]) return alert("Please select an image first!");

        extractBtn.disabled = true;
        loader.style.display = "block";
        resultArea.style.display = "none";

        try {
            const result = await Tesseract.recognize(imageInput.files[0], 'eng');
            output.innerText = result.data.text;
            resultArea.style.display = "block";
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            extractBtn.disabled = false;
            loader.style.display = "none";
        }
    };

    function copyText() {
        navigator.clipboard.writeText(output.innerText);
        alert("Text Copied!");
    }
</script>

</body>
</html>
