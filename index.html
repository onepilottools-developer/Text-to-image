<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer | OnePilotTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #4f46e5; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 1100px; background: #fff; padding: 30px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); display: flex; flex-direction: column; gap: 20px; }
        header { text-align: center; }
        h1 { margin: 0; font-size: 30px; font-weight: 800; color: #1e293b; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .label { font-weight: 700; font-size: 12px; text-transform: uppercase; color: #64748b; margin-bottom: 8px; display: block; }
        
        textarea, .output-box { width: 100%; height: 420px; padding: 20px; border: 2px solid var(--border); border-radius: 16px; font-size: 16px; line-height: 1.7; outline: none; transition: 0.3s; }
        textarea { background: #fafafa; resize: none; }
        textarea:focus { border-color: var(--p); background: #fff; }
        .output-box { background: #fff; overflow-y: auto; white-space: pre-wrap; position: relative; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 15px 25px; border-radius: 15px; }
        .controls { display: flex; gap: 15px; align-items: center; }
        
        select { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; cursor: pointer; }
        
        #action-btn { padding: 14px 35px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        #action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }
        #action-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        .btn-group { margin-top: 10px; display: flex; gap: 10px; justify-content: flex-end; }
        .util-btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; display: none; }
        
        #loader { display: none; font-weight: 700; color: var(--p); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } textarea, .output-box { height: 300px; } }
    </style>
</head>
<body>

<div class="container">
    <header><h1>OnePilot AI Summarizer</h1></header>

    <div class="grid">
        <div class="col">
            <span class="label">Source Content</span>
            <textarea id="input" placeholder="Paste your long article or text here..."></textarea>
            <div style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Words: <span id="w-count">0</span> / 2000</div>
        </div>
        <div class="col">
            <span class="label">AI Summary</span>
            <div class="output-box" id="output">Result will appear here...</div>
            <div class="btn-group">
                <button id="dl-btn" class="util-btn" style="background:#6366f1; color:white;">Download .txt</button>
                <button id="cp-btn" class="util-btn" style="background:#10b981; color:white;">Copy Summary</button>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <div class="controls">
            <span>Length:</span>
            <select id="length">
                <option value="short">Short (Bullet Points)</option>
                <option value="medium" selected>Medium (Balanced)</option>
                <option value="long">Long (Detailed)</option>
            </select>
            <div id="loader">AI is thinking...</div>
        </div>
        <button id="action-btn">Summarize Content</button>
    </div>
</div>

<script>
    // 👇 APNA WORKER URL YAHA DALAIN 👇
    const WORKER_URL = "// Is line ko update karein:
const WORKER_URL = "https://blue-math-eb4aonepilot-summarizer.onepilottools.workers.dev/";"; 

    const btn = document.getElementById('action-btn');
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const wCount = document.getElementById('w-count');
    const cpBtn = document.getElementById('cp-btn');
    const dlBtn = document.getElementById('dl-btn');

    input.addEventListener('input', () => {
        const words = input.value.trim() ? input.value.trim().split(/\s+/).length : 0;
        wCount.innerText = words;
        wCount.style.color = words > 2000 ? "red" : "#94a3b8";
    });

    btn.onclick = async () => {
        const text = input.value.trim();
        if(!text) return alert("Bahi, pehle text to likhen!");
        if(text.split(/\s+/).length > 2000) return alert("Limit 2000 words hai!");

        btn.disabled = true;
        document.getElementById('loader').style.display = "block";
        output.innerText = "Analyzing and summarizing your text...";
        cpBtn.style.display = "none";
        dlBtn.style.display = "none";

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, length: document.getElementById('length').value })
            });
            const data = await res.json();
            
            if(data.summary) {
                output.innerText = data.summary;
                cpBtn.style.display = "block";
                dlBtn.style.display = "block";
            } else {
                output.innerText = "Error: AI could not generate summary.";
            }
        } catch (e) {
            output.innerText = "Connection Error! Please check your Worker URL.";
        } finally {
            btn.disabled = false;
            document.getElementById('loader').style.display = "none";
        }
    };

    cpBtn.onclick = () => {
        navigator.clipboard.writeText(output.innerText);
        cpBtn.innerText = "Copied!";
        setTimeout(() => cpBtn.innerText = "Copy Summary", 2000);
    };

    dlBtn.onclick = () => {
        const blob = new Blob([output.innerText], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'onepilot-summary.txt';
        a.click();
    };
</script>
</body>
</html>
