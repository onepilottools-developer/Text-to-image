<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Grammar Checker & Spell Checker | OnePilotTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #007bff; --bg: #f8f9fa; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        
        .card { width: 100%; max-width: 800px; background: var(--card); padding: 40px; border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #eee; text-align: center; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; color: #111; }
        p.tagline { color: #64748b; margin-bottom: 35px; font-size: 16px; }

        /* Input Area */
        textarea { width: 100%; height: 220px; padding: 25px; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 17px; line-height: 1.6; margin-bottom: 20px; resize: none; outline: none; transition: 0.3s; box-sizing: border-box; background: #fafafa; }
        textarea:focus { border-color: var(--p); background: #fff; box-shadow: 0 0 0 4px rgba(0,123,255,0.1); }

        /* Buttons Section */
        .action-bar { display: flex; gap: 15px; margin-bottom: 30px; }
        #check-btn { flex: 2; padding: 20px; background: var(--p); color: #fff; border: none; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,123,255,0.2); }
        #check-btn:hover { background: #0056b3; transform: translateY(-2px); }
        #check-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .secondary-btn { flex: 1; padding: 20px; background: #f1f5f9; color: #475569; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .secondary-btn:hover { background: #e2e8f0; }

        /* Loader Animation */
        .loading-container { display: none; margin-bottom: 25px; }
        .spinner { width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Result Section */
        #result-section { display: none; text-align: left; background: #f8fafc; padding: 30px; border-radius: 20px; border: 1px solid #e2e8f0; margin-top: 20px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; }
        .result-header span { font-weight: 700; font-size: 14px; text-transform: uppercase; color: #64748b; }
        #output-text { font-size: 17px; line-height: 1.8; color: #1e293b; white-space: pre-wrap; outline: none; }
        
        .copy-btn { background: #10b981; color: #fff; border: none; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .copy-btn:hover { background: #059669; }
    </style>
</head>
<body>

<div class="card">
    <h1>AI Grammar Checker</h1>
    <p class="tagline">Premium spelling, punctuation, and grammar correction by OnePilotTools.</p>

    <textarea id="text-input" placeholder="Enter or paste your English text here to fix errors..."></textarea>
    
    <div class="loading-container" id="loader">
        <div class="spinner"></div>
        <p>AI is analyzing your text...</p>
    </div>

    <div class="action-bar">
        <button id="check-btn">Check & Fix Errors</button>
        <button class="secondary-btn" id="clear-btn">Clear All</button>
    </div>

    <div id="result-section">
        <div class="result-header">
            <span>✅ AI Corrected Text</span>
            <button class="copy-btn" id="copy-btn">Copy Result</button>
        </div>
        <div id="output-text" contenteditable="true"></div>
    </div>
</div>

<script>
    const checkBtn = document.getElementById('check-btn');
    const clearBtn = document.getElementById('clear-btn');
    const input = document.getElementById('text-input');
    const resultSection = document.getElementById('result-section');
    const outputText = document.getElementById('output-text');
    const loader = document.getElementById('loader');
    const copyBtn = document.getElementById('copy-btn');

    checkBtn.onclick = async () => {
        const text = input.value.trim();
        if (text.length < 5) {
            alert("Bahi, kam az kam aik sentence to likhein!");
            return;
        }

        // UI Reset
        checkBtn.disabled = true;
        loader.style.display = "block";
        resultSection.style.display = "none";

        try {
            // New Worker URL
            const response = await fetch("https://gentle-dream-3790onepilot-grammar-ai.onepilottools.workers.dev/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            });

            if (!response.ok) throw new Error('Worker Connection Failed');

            const data = await response.json();

            if (data.corrected) {
                outputText.innerText = data.corrected;
                resultSection.style.display = "block";
                resultSection.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("AI could not process this text. Please try again.");
            }
        } catch (error) {
            console.error(error);
            alert("Error: Could not connect to OnePilot AI Engine. Please check your Worker deployment.");
        } finally {
            checkBtn.disabled = false;
            loader.style.display = "none";
        }
    };

    // Clear Button
    clearBtn.onclick = () => {
        input.value = "";
        resultSection.style.display = "none";
        input.focus();
    };

    // Copy Functionality
    copyBtn.onclick = () => {
        navigator.clipboard.writeText(outputText.innerText).then(() => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "✅ Copied!";
            copyBtn.style.background = "#059669";
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.background = "#10b981";
            }, 2000);
        });
    };
</script>

</body>
</html>
