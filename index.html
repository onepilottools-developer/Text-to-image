<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image to Text Converter | OnePilotTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #007bff; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #333; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        
        .card { width: 100%; max-width: 650px; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; color: #111; }
        p { color: #666; margin-bottom: 30px; font-size: 15px; }

        /* Modern Upload Box */
        .upload-container { border: 2px dashed #d1d5db; padding: 40px 20px; border-radius: 16px; cursor: pointer; transition: 0.3s; background: #fafafa; position: relative; margin-bottom: 25px; }
        .upload-container:hover { border-color: var(--p); background: #f0f7ff; }
        .upload-container input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .icon-circle { font-size: 40px; display: block; margin-bottom: 12px; }
        #file-info { font-weight: 600; color: #444; }

        /* Premium Button */
        #extract-btn { width: 100%; padding: 18px; background: var(--p); color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,123,255,0.25); }
        #extract-btn:hover { background: #0056b3; transform: translateY(-2px); }
        #extract-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Output Styling */
        #result-section { margin-top: 35px; display: none; text-align: left; }
        .result-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #output-text { width: 100%; min-height: 200px; padding: 20px; background: #fdfdfd; border: 1px solid #e5e7eb; border-radius: 14px; font-size: 16px; line-height: 1.7; color: #333; outline: none; white-space: pre-wrap; box-sizing: border-box; }
        
        .copy-btn { background: #10b981; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .copy-btn:hover { background: #059669; }

        /* Loading Spinner */
        .loader { display: none; margin: 20px auto; width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>AI Image to Text</h1>
    <p>Upload a screenshot or photo to extract all text instantly for free.</p>

    <div class="upload-container" id="drop-zone">
        <span class="icon-circle">📄</span>
        <span id="file-info">Click to upload or Drag & Drop image</span>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <button id="extract-btn">Extract All Text</button>
    <div class="loader" id="loader"></div>

    <div id="result-section">
        <div class="result-bar">
            <strong>📋 Extracted Result:</strong>
            <button class="copy-btn" id="copyBtn">Copy Text</button>
        </div>
        <div id="output-text" contenteditable="true"></div>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const fileInfo = document.getElementById('file-info');
    const extractBtn = document.getElementById('extract-btn');
    const resultSection = document.getElementById('result-section');
    const outputText = document.getElementById('output-text');
    const loader = document.getElementById('loader');
    const copyBtn = document.getElementById('copyBtn');

    // Display filename when selected
    imageInput.onchange = () => {
        if(imageInput.files[0]) {
            fileInfo.innerText = "Selected: " + imageInput.files[0].name;
            fileInfo.style.color = "#007bff";
        }
    };

    extractBtn.onclick = async () => {
        if (!imageInput.files[0]) {
            alert("Bahi, pehle koi image select karein!");
            return;
        }

        // UI Updates
        extractBtn.disabled = true;
        extractBtn.innerText = "Scanning Image...";
        loader.style.display = "block";
        resultSection.style.display = 'none';

        const formData = new FormData();
        formData.append('image', imageInput.files[0]);

        try {
            // Your Live Cloudflare Worker URL
            const response = await fetch("https://restless-truth-6178-onepilot-ocr-ai.onepilottools.workers.dev/", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.response) {
                outputText.innerText = data.response;
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("AI could not read the text. Make sure the image is clear.");
            }
        } catch (error) {
            console.error(error);
            alert("Connection Error! Worker settings check karein.");
        } finally {
            extractBtn.disabled = false;
            extractBtn.innerText = "Extract All Text";
            loader.style.display = "none";
        }
    };

    // Copy to Clipboard Function
    copyBtn.onclick = () => {
        navigator.clipboard.writeText(outputText.innerText);
        copyBtn.innerText = "✅ Copied!";
        setTimeout(() => copyBtn.innerText = "Copy Text", 2000);
    };
</script>

</body>
</html>
