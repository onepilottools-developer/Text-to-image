<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Grammar Checker with Highlights | OnePilotTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <style>
        :root { --p: #007bff; --bg: #f8f9fa; --del: #fee2e2; --ins: #dcfce7; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        .card { width: 100%; max-width: 800px; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        textarea { width: 100%; height: 180px; padding: 20px; border: 2px solid #e0e0e0; border-radius: 16px; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; box-sizing: border-box; }
        textarea:focus { border-color: var(--p); }

        #check-btn { width: 100%; padding: 18px; background: var(--p); color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; }
        
        .result-box { display: none; margin-top: 30px; }
        .diff-container { padding: 20px; border: 1px dashed #cbd5e1; border-radius: 12px; background: #fdfdfd; line-height: 1.8; font-size: 17px; margin-bottom: 20px; }
        
        /* Highlighting Styles */
        del { background-color: var(--del); color: #b91c1c; text-decoration: line-through; padding: 2px 4px; border-radius: 4px; margin: 0 2px; }
        ins { background-color: var(--ins); color: #15803d; text-decoration: none; padding: 2px 4px; border-radius: 4px; margin: 0 2px; font-weight: 600; }

        .final-output { background: #f1f5f9; padding: 20px; border-radius: 12px; font-weight: 500; border-left: 5px solid var(--p); }
        .loader { display: none; text-align: center; margin: 20px; color: var(--p); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="text-align:center;">AI Grammar Highlighter</h1>
    <p style="text-align:center; color:#666;">See exactly what the AI changed in your text.</p>

    <textarea id="text-input" placeholder="Paste your text with mistakes here..."></textarea>
    
    <div class="loader" id="loader">Analyzing Grammar...</div>
    <button id="check-btn">Find & Fix Mistakes</button>

    <div class="result-box" id="result-box">
        <h3 style="margin-bottom:10px;">🔍 Changes Detected:</h3>
        <div class="diff-container" id="diff-output"></div>

        <h3 style="margin-bottom:10px;">✨ Perfect Version:</h3>
        <div class="final-output" id="final-text"></div>
        <button onclick="copyText()" style="margin-top:15px; padding:10px 20px; cursor:pointer; background:#10b981; color:white; border:none; border-radius:8px; font-weight:bold;">Copy Perfect Text</button>
    </div>
</div>

<script>
    const checkBtn = document.getElementById('check-btn');
    const input = document.getElementById('text-input');
    const resultBox = document.getElementById('result-box');
    const diffOutput = document.getElementById('diff-output');
    const finalText = document.getElementById('final-text');
    const loader = document.getElementById('loader');

    checkBtn.onclick = async () => {
        const original = input.value.trim();
        if (original.length < 5) return alert("Bahi, kuch to likhein!");

        checkBtn.disabled = true;
        loader.style.display = "block";
        resultBox.style.display = "none";

        try {
            const res = await fetch("https://gentle-dream-3790onepilot-grammar-ai.onepilottools.workers.dev/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: original })
            });
            const data = await res.json();
            const corrected = data.corrected;

            // Highlight Logic using jsdiff
            const diff = Diff.diffWords(original, corrected);
            let diffHtml = "";

            diff.forEach((part) => {
                const color = part.added ? 'ins' : part.removed ? 'del' : 'span';
                const tag = part.added ? 'ins' : part.removed ? 'del' : 'span';
                diffHtml += `<${tag}>${part.value}</${tag}>`;
            });

            diffOutput.innerHTML = diffHtml;
            finalText.innerText = corrected;
            resultBox.style.display = "block";
        } catch (e) {
            alert("Connection Error!");
        } finally {
            checkBtn.disabled = false;
            loader.style.display = "none";
        }
    };

    function copyText() {
        navigator.clipboard.writeText(finalText.innerText);
        alert("Text Copied!");
    }
</script>

</body>
</html>
