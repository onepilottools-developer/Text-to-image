<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Image to Text Converter | OnePilotTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #007bff; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1a1a1a; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        
        .card { width: 100%; max-width: 650px; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.04); text-align: center; border: 1px solid #eaeaea; }
        h1 { font-size: 30px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        p { color: #6b7280; margin-bottom: 30px; font-size: 15px; }

        /* Modern Upload Box */
        .upload-container { border: 2px dashed #d1d5db; padding: 50px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; background: #fafafa; position: relative; margin-bottom: 25px; }
        .upload-container:hover { border-color: var(--p); background: #f0f7ff; }
        .upload-container input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .icon-circle { font-size: 50px; display: block; margin-bottom: 15px; opacity: 0.8; }
        #file-info { font-weight: 600; color: #4b5563; }

        /* Premium Extraction Button */
        #extract-btn { width: 100%; padding: 18px; background: var(--p); color: #fff; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,123,255,0.2); }
        #extract-btn:hover { background: #0056b3; transform: translateY(-2px); }
        #extract-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Result Section */
        #result-section { margin-top: 40px; display: none; text-align: left; border-top: 2px solid #f9fafb; padding-top: 30px; }
        .result-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #output-text { width: 100%; min-height: 200px; padding: 20px; background: #fcfcfc; border: 1px solid #e5e7eb; border-radius: 16px; font-size: 16px; line-height: 1.8; color: #374151; outline: none; white-space: pre-wrap; box-sizing: border-box; }
        
        .copy-btn { background: #10b981; color: #fff; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .copy-btn:hover { background: #059669; }

        /* Animated Loader */
        .loader { display: none; margin: 20px auto; width: 35px; height: 35px; border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>AI Image to Text</h1>
    <p>Premium OCR tool to extract text from images, powered by OnePilotTools AI.</p>

    <div class="upload-container">
        <span class="icon-circle">📸</span>
        <span id="file-info">Click or Drag & Drop Image Here</span>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <button id="extract-btn">Extract All Text</button>
    <div class="loader" id="loader"></div>

    <div id="result-section">
        <div class="result-bar">
            <strong>📋 Extracted Result:</strong>
            <button class="copy-btn" id="copyBtn">Copy Text</button>
        </div>
        <div id="output-text" contenteditable="true"></div>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const fileInfo = document.getElementById('file-info');
    const extractBtn = document.getElementById('extract-btn');
    const resultSection = document.getElementById('result-section');
    const outputText = document.getElementById('output-text');
    const loader = document.getElementById('loader');
    const copyBtn = document.getElementById('copyBtn');

    // Update UI when file is chosen
    imageInput.onchange = () => {
        if(imageInput.files[0]) {
            fileInfo.innerText = "Selected: " + imageInput.files[0].name;
            fileInfo.style.color = "#007bff";
        }
    };

    extractBtn.onclick = async () => {
        if (!imageInput.files[0]) {
            alert("Bahi, pehle koi image select karein!");
            return;
        }

        // Reset UI
        extractBtn.disabled = true;
        extractBtn.innerText = "AI is Extracting Text...";
        loader.style.display = "block";
        resultSection.style.display = 'none';

        const formData = new FormData();
        formData.append('image', imageInput.files[0]);

        try {
            // New Worker URL
            const response = await fetch("https://onepilot-ai-ocr.onepilottools.workers.dev/", {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error('Worker Response Error');

            const data = await response.json();

            if (data.response) {
                outputText.innerText = data.response;
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("AI could not extract text. Please try with a clearer image.");
            }
        } catch (error) {
            console.error(error);
            alert("Connection Error! Please check if your new Worker is Deployed and Binding is added.");
        } finally {
            extractBtn.disabled = false;
            extractBtn.innerText = "Extract All Text";
            loader.style.display = "none";
        }
    };

    // Copy functionality
    copyBtn.onclick = () => {
        navigator.clipboard.writeText(outputText.innerText).then(() => {
            copyBtn.innerText = "✅ Copied!";
            setTimeout(() => copyBtn.innerText = "Copy Text", 2000);
        });
    };
</script>

</body>
</html>
